<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>

    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./node_modules/bootstrap/dist/css/bootstrap.min.css">
    <script src="./script.js"></script>
    <script src="./templates.js"></script>
</head>

<body onload="init()">
    <nav class="navBar">
        <h1>Pokedex</h1>
        <img class="pokeBall" src="./img/pokeball.png" alt="Pokeball">
    </nav>
    <search  class="searchBar">
        <input type="text" placeholder="Search for a Pokemon...">
        <button class="btn btn-danger" type="submit">Search</button>
    </search>
    <main id="mainContent">

        <section>
            <div class="cardBg">
                <span>#1</span>
                <span>Bulbasaur</span>
            </div>
            <div>
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/1.png" alt="Bulbasaur">
            </div>
            <div class="cardBg">
                <img class="typeIcons" src="./img/Type=Grass.svg" alt="Grass Type">
                <img class="typeIcons" src="./img/Type=Poison.svg" alt="Poison Type">
            </div>
        </section>
        
    </main>
    <footer class="footer">
        <p>&copy; 2026 Pokedex. By Leon Weigang.</p>
    </footer>

</body>

</html>
