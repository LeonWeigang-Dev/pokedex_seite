<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>

    <link rel="icon" href="./img/pokeball.png">
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./node_modules/bootstrap/dist/css/bootstrap.min.css">
    <script src="./script.js"></script>
    <script src="./templates.js"></script>
</head>

<body onload="init()">
    <div id="loadingScreen" class="loadingSpinner d-none">
        <img src="./img/loadingspinner.gif" alt="Loading...">
    </div>
    <nav class="navBar">
        <h1>Pokedex</h1>
        <img class="pokeBall" src="./img/pokeball.png" alt="Pokeball">
    </nav>
    <search class="searchBar">
        <input type="text" placeholder="Search for a Pokemon...">
        <button class="btn btn-danger" type="submit">Search</button>
    </search>
    <main>
        <div id="mainContent" class="mainContent"></div>
    </main>
    <section class="morePokemonBtn"><button class="btn btn-danger" onclick="loadMore()">Load More...</button></section>
    <footer class="footer">
        <div class="footerContainer">
            <p class="footerTitle">&copy; 2026 Pokedex. By Leon Weigang.</p>
        </div>

    </footer>

</body>

</html>
